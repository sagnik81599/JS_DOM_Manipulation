<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Form</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f2f2f2;
    }

    .container{
        width:350px;
        background:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
    }

    label{
        color:brown;
        font-weight:600;
    }

    input{
        width:100%;
        padding:10px;
        margin:8px 0 15px;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        width:100%;
        padding:10px;
        background:blue;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:darkblue;
    }

    #result{
        margin-top:20px;
        text-align:center;
        font-weight:bold;
    }
</style>

</head>
<body>

<div class="container">

    <h1>Register Form</h1>

    <form id="register">

        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <button id="btn" type="submit">Submit</button>

    </form>

    <p id="result"></p>

</div>

</body>
</html>

    <script src="f.js"></script>
    
</body>
</html>
